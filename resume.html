<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nensi Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    a {
      color: #ff5c5c;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Nensi</h1>
  <p>My Portfolio</p>
</header>

<section>
  <h2>About Me</h2>
  <p>Hello! I am a creative designer. I love making beautiful designs and websites.</p>
</section>

<section>
  <h2>My Work</h2>
  <div class="projects">

    <div class="card">
      <h3>Project 1</h3>
      <p>Social media design</p>
    </div>

    <div class="card">
      <h3>Project 2</h3>
      <p>Website design</p>
    </div>

    <div class="card">
      <h3>Project 3</h3>
      <p>Branding</p>
    </div>

  </div>
</section>

<section>
  <h2>Contact</h2>
  <p>Email: nensi@email.com</p>
</section>

<footer>
  <p>© 2026 Nensi Portfolio</p>
</footer>

</body>
</html>
